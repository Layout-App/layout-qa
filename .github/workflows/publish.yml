name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run check
      - run: npm pack --dry-run

      - name: Publish @trylayout/qa
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @trylayout/qa@$VERSION version >/dev/null 2>&1; then
            echo "@trylayout/qa@$VERSION already published"
          else
            npm publish --access public
          fi

      - name: Publish layout-qa alias
        run: |
          VERSION=$(node -p "require('./packages/layout-qa/package.json').version")
          if npm view layout-qa@$VERSION version >/dev/null 2>&1; then
            echo "layout-qa@$VERSION already published"
          else
            cd packages/layout-qa
            npm publish --access public
          fi
